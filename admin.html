<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard — Tech Vortex</title>
<link rel="stylesheet" href="css/design.css?v=2"/>
<link rel="stylesheet" href="css/loader.css?v=1"/>
<style>
    .admin-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .table-wrapper { overflow-x: auto; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    td { color: var(--text-bright); }
    .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .status-pending { background: rgba(255, 193, 7, 0.1); color: #ffc107; border: 1px solid rgba(255,193,7,0.3); }
    .status-verified { background: rgba(40, 167, 69, 0.1); color: #28a745; border: 1px solid rgba(40,167,69,0.3); }
    .comp-header { margin-top: 40px; margin-bottom: 20px; color: var(--creamy-blue); font-size: 1.2rem; font-weight: 600; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
    
    /* Login Gateway */
    #login-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; transition: opacity 0.5s ease; overflow-y: auto; }
    #login-box { width: 100%; max-width: 400px; text-align: center; }
    .forgot-link { display:inline-block; margin-top:8px; margin-bottom:16px; font-size:13px; color:var(--creamy-blue); cursor:pointer; text-decoration:none; opacity:0.85; transition:opacity 0.2s; }
    .forgot-link:hover { opacity:1; text-decoration:underline; }
    .login-info { font-size:13px; margin-top:12px; padding:10px 14px; border-radius:8px; display:none; }
    .login-info-success { background:rgba(40,167,69,0.1); border:1px solid rgba(40,167,69,0.3); color:#28a745; }
    .login-info-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444; }
    
    /* Event Cards */
    .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-top: 30px; }
    .event-card { cursor: pointer; text-align: center; padding: 30px 20px; }
    .event-card-count { font-size: 2.5rem; font-weight: 700; color: var(--creamy-blue); font-family: var(--font-mono); line-height: 1; margin-top: 10px; }

</style>
</head>
<body>

<!-- Loader Overlay -->
<div id="admin-loader-overlay" class="loader-overlay">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="admin-loader-text">Updating...</div>
</div>

<!-- Custom Popup Modal -->
<div id="admin-popup-overlay" class="popup-overlay">
    <div class="popup-card">
        <div class="popup-icon" id="admin-popup-icon">⚡</div>
        <div class="popup-title" id="admin-popup-title">Confirm Action</div>
        <div class="popup-message" id="admin-popup-message">Are you sure?</div>
        <div class="popup-actions" id="admin-popup-actions">
            <button class="btn popup-btn-cancel" id="admin-popup-cancel">Cancel</button>
            <button class="btn popup-btn-confirm" id="admin-popup-confirm">Confirm</button>
        </div>
    </div>
</div>

<!-- Login Overlay -->
<div id="login-overlay">
    <div id="login-box" class="glass-card glass-card-lg">
        <div style="display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; background:var(--white); border-radius:50%; margin-bottom:24px; overflow:hidden;">
            <img src="assets/images/college/logovortex.jpeg" alt="Logo" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h2 class="heading-md" style="margin-bottom:8px;">Admin Login</h2>
        <p class="text-muted" style="margin-bottom:24px; font-size:14px;">Sign in to access the dashboard.</p>

        <!-- Coordinator Google Sign-In -->
        <button onclick="coordinatorGoogleSignIn()" class="btn btn-outline" id="coord-google-btn" style="width:100%; justify-content:center; gap:10px; padding:14px; margin-bottom:16px; font-size:13px;">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Sign in as Coordinator (Google)
        </button>

        <!-- Divider -->
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
            <div style="flex:1; height:1px; background:var(--border);"></div>
            <span style="font-size:11px; color:var(--text-dim); font-family:var(--font-mono); letter-spacing:0.1em;">SUPER ADMIN</span>
            <div style="flex:1; height:1px; background:var(--border);"></div>
        </div>

        <!-- Super Admin Password Login -->
        <form id="admin-login-form" onsubmit="handleLogin(event)">
            <input type="hidden" id="admin-email" value="sscodehubsuport@gmail.com">
            <input type="password" id="admin-pass" class="input" placeholder="Password" required style="margin-bottom:4px; text-align:center; letter-spacing:0.2em;">
            <a class="forgot-link" onclick="handleForgotPassword()">Forgot Password?</a>
            <button type="submit" class="btn btn-gold" id="login-btn" style="width:100%; justify-content:center;">Unlock Dashboard</button>
            <div id="login-msg" class="login-info"></div>
        </form>
    </div>
</div>

<div class="site-wrapper" style="min-height: 100vh; display:none;" id="main-dashboard">
    <!-- NAV (minimal) -->
    <nav class="nav" style="position:relative; transform:none; left:auto; margin: 20px auto; width: max-content;">
        <div class="nav-brand" style="margin-right: 20px; padding-right: 20px;">
            <div class="nav-brand-icon"><img src="assets/images/college/logovortex.jpeg" alt="Logo" style="width:100%; height:100%; object-fit:cover;"></div>
            <div class="nav-brand-text">
                <span class="nav-brand-title" style="line-height: 1.2;">Admin Dashboard</span>
            </div>
        </div>
        <div class="nav-cta" style="display:flex; gap:12px; align-items:center;">
            <a href="index.html" class="btn btn-outline btn-sm">← Back to Site</a>
            <button class="btn btn-outline btn-sm" onclick="adminLogout()" style="color:#ef4444; border-color:rgba(239,68,68,0.3); opacity: 0.9;">Logout</button>
        </div>
    </nav>

    <div style="text-align:center; padding:14px 26px; margin:20px 20px 0; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; font-size:12px; letter-spacing:0.06em; color:var(--text-muted);">
        🔒 Dashboard Secured & Managed by <span style="color:var(--creamy-blue); font-weight:600;">SSCodeHub</span>
    </div>

    <div class="admin-container">
        <div style="margin-bottom:32px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px;">
            <div>
                <h1 class="heading-lg">Registrations</h1>
                <p class="text-muted">Viewing all registered participants, grouped by competition.</p>
            </div>
            <div>
                <button class="btn btn-outline btn-sm" onclick="fetchRegistrations()">↻ Refresh</button>
            </div>
        </div>

        <div id="admin-content">
            <div style="text-align:center; padding: 40px; color:var(--text-muted);">
                Loading registrations...
            </div>
        </div>

    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="js/emailjs-config.js?v=1"></script>
<script src="js/firebase-config.js?v=2"></script>
<script src="js/admin.js?v=5"></script>
</body>
</html>
